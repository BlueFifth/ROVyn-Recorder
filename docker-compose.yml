services:
  rovyn-recorder:
    image: bluefifth/rovyn-recorder:0.1.0
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
      - /media:/media
      - /mnt:/mnt
      - /run/udev:/run/udev:ro
    environment:
      - PYTHONUNBUFFERED=1
      - GST_DEBUG=1
    restart: unless-stopped
